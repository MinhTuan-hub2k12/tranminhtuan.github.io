<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎭 Game Troll Siêu Hài | Đừng có bấm linh tinh</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            background-size: 400% 400%;
            animation: bgMove 8s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes bgMove {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        .game-box {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
            border: 2px solid gold;
            max-width: 500px;
            width: 90%;
            transition: 0.3s;
            animation: zoomIn 0.5s ease;
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #f9ca24, #f0932b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .sub {
            color: #feca57;
            margin-bottom: 30px;
            font-style: italic;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
            padding: 15px 25px;
            margin-bottom: 30px;
            color: white;
            font-weight: bold;
            font-size: 1.2em;
        }

        .score-board span {
            color: #feca57;
            font-size: 1.5em;
        }

        .troll-btn {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border: none;
            color: white;
            font-size: 2em;
            font-weight: bold;
            padding: 20px 40px;
            border-radius: 100px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 10px 0 #c0392b;
            width: 100%;
            font-family: inherit;
            margin-bottom: 30px;
            position: relative;
        }

        .troll-btn:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #c0392b;
        }

        .message-area {
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            padding: 20px;
            min-height: 120px;
            margin-bottom: 20px;
            font-size: 1.2em;
            color: #fff;
            border-left: 10px solid #feca57;
            text-align: left;
            transition: 0.2s;
        }

        .reset-btn {
            background: #2ed573;
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1em;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .reset-btn:hover {
            background: #1eae65;
            transform: scale(1.03);
        }

        .hidden-surprise {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: gold;
            color: black;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            opacity: 0.6;
        }

        .shake {
            animation: shakeAnim 0.3s ease-in-out 0s 2;
        }

        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .blink {
            animation: blinkAnim 0.1s 5;
        }

        @keyframes blinkAnim {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .floating {
            animation: float 1s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        footer {
            color: rgba(255,255,255,0.6);
            font-size: 0.7em;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="game-box" id="gameBox">
    <h1>🤡 NÚT THÁCH THỨC 🤡</h1>
    <div class="sub">"Bấm vào nếu bạn ĐỦ DŨNG KHÍ"</div>

    <div class="score-board">
        <div>💥 Số lần bị troll:</div>
        <div><span id="trollCount">0</span> lần</div>
    </div>

    <button class="troll-btn" id="mainBtn">👉 BẤM VÀO ĐÂY 👈</button>

    <div class="message-area" id="msgArea">
        💬 Hãy bấm vào nút... nhưng... coi chừng!<br>
        ⚠️ Mỗi lần bấm sẽ có 1 bất ngờ hài hước.
    </div>

    <button class="reset-btn" id="resetBtn">🔄 Làm mới & Cứu tinh thần</button>
    <footer>🎭 Game Troll siêu cấp hài hước - Đừng giận khi chơi nhé!</footer>
</div>

<div class="hidden-surprise" id="surpriseBtn">🎁 ?</div>

<script>
    // Mảng các câu troll siêu hài
    const trollMessages = [
        "🤣 BẤM LÀM GÌ? Không có tác dụng đâu! (hay là có?)",
        "🐔 Ú òa! Bạn vừa bị gà vàng troll! 🐔",
        "🧠 Bộ não của bạn: 'Sao mình bấm hoài vậy?'",
        "🤡 Bạn tin vào nút này à? Ảo tưởng vừa thôi!",
        "📢 THÔNG BÁO: Bạn vừa tốn 1 giây cuộc đời để bấm nút vô dụng!",
        "🎉 CHÚC MỪNG! Bạn nhận được 0 điểm và 1 nụ cười miễn phí!",
        "💀 Hết hồn chưa? Nút này không làm gì đâu... hoặc có?",
        "🐱‍👤 Ninja bấm nút: Bạn vừa bị lừa 1 lần nữa!",
        "🍌 Bấm tiếp đi, con khỉ đang cười bạn kìa!",
        "⚡ 1 triệu volt hài hước phóng qua người bạn! *đùa thôi*",
        "🎭 'Tôi đã bảo đừng bấm mà' - Chính bạn 2 giây sau sẽ nói vậy.",
        "🚨 CẢNH BÁO: Bạn đang bị nghiện bấm nút troll!",
        "🦄 Một chú kỳ lân xuất hiện và nói: 'Bấm nữa đi, vui lắm!'",
        "🍕 Bấm thêm 10 lần nữa sẽ có pizza ảo... đùa thôi!",
        "🕹️ Bạn đã mở khóa thành tích: 'Người hùng bấm linh tinh'"
    ];

    const specialMessages = [
        "💀 THẬT À? Bạn bấm tới 10 lần luôn? Ghê vậy! 💀",
        "🤯 10 LẦN RỒI! Bạn có bị ám ảnh cưỡng chế không? 🤯",
        "🏆 TẶNG BẠN HUY CHƯƠNG 'THẦN BẤM NÚT' 🏆"
    ];

    let trollCounter = 0;
    let clickCount = 0;
    let lastClickTime = 0;
    let isShaking = false;

    const mainBtn = document.getElementById('mainBtn');
    const resetBtn = document.getElementById('resetBtn');
    const trollCountSpan = document.getElementById('trollCount');
    const msgArea = document.getElementById('msgArea');
    const gameBox = document.getElementById('gameBox');
    const surpriseBtn = document.getElementById('surpriseBtn');

    // Hàm chơi nhạc ảo (tạo âm thanh hài)
    function playBeep() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = Math.random() * 800 + 300;
            gainNode.gain.value = 0.1;
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
            oscillator.stop(audioCtx.currentTime + 0.5);
            audioCtx.resume();
        } catch(e) { console.log("Audio context bị chặn, thôi kệ!"); }
    }

    // Hàm troll đủ thể loại
    function trollEffect() {
        // Random hiệu ứng
        const randEffect = Math.floor(Math.random() * 10);
        
        switch(randEffect) {
            case 0:
                gameBox.classList.add('shake');
                setTimeout(() => gameBox.classList.remove('shake'), 500);
                break;
            case 1:
                document.body.classList.add('blink');
                setTimeout(() => document.body.classList.remove('blink'), 300);
                break;
            case 2:
                mainBtn.style.transform = `rotate(${Math.random() * 10 - 5}deg)`;
                setTimeout(() => mainBtn.style.transform = '', 300);
                break;
            case 3:
                const oldText = mainBtn.innerHTML;
                mainBtn.innerHTML = ["👉 ĐỪNG BẤM 👈","🤡 THÔI MÀ 🤡","🐣 CHẠY ĐI 🐣"][Math.floor(Math.random()*3)];
                setTimeout(() => mainBtn.innerHTML = oldText, 800);
                break;
            case 4:
                msgArea.style.transform = 'scale(0.95)';
                setTimeout(() => msgArea.style.transform = '', 200);
                break;
            case 5:
                playBeep();
                break;
            case 6:
                // Đổi màu chữ tạm thời
                msgArea.style.color = '#ff9ff3';
                setTimeout(() => msgArea.style.color = 'white', 500);
                break;
            case 7:
                // Di chuyển nút linh tinh
                const x = Math.random() * 20 - 10;
                const y = Math.random() * 20 - 10;
                mainBtn.style.transform = `translate(${x}px, ${y}px)`;
                setTimeout(() => mainBtn.style.transform = '', 200);
                break;
            default:
                // Không làm gì thêm
        }
    }

    // Hàm chính khi bấm nút
    function onMainButtonClick() {
        clickCount++;
        trollCounter++;
        trollCountSpan.innerText = trollCounter;
        
        // Chọn random tin nhắn troll
        let randomMsg;
        if (clickCount === 10 || clickCount === 15 || clickCount === 20) {
            randomMsg = specialMessages[Math.floor(Math.random() * specialMessages.length)];
        } else {
            randomMsg = trollMessages[Math.floor(Math.random() * trollMessages.length)];
        }
        
        // Thêm icon cho vui
        const icons = ["😂","😭","🤣","😈","👻","🎃","🤡","🐔","🐒","🍌"];
        const randomIcon = icons[Math.floor(Math.random() * icons.length)];
        
        msgArea.innerHTML = `💬 ${randomIcon} ${randomMsg} ${randomIcon}<br>📊 Bạn đã bấm tổng cộng: <strong>${clickCount}</strong> lần (bị troll ${trollCounter} lần)`;
        
        // Gây hiệu ứng troll
        trollEffect();
        
        // Nếu bấm quá 20 lần, xuất hiện thông báo đặc biệt
        if (clickCount >= 20 && clickCount % 7 === 0) {
            alert("🤪 BẠN BỊ NGHIỆN BẤM NÚT RỒI! 🤪 HÃY THỞ SÂU VÀ RESET ĐI!");
        }
        
        // Bấm nhanh liên tục sẽ có thêm troll
        const now = Date.now();
        if (now - lastClickTime < 500) {
            msgArea.innerHTML += "<br>⚡ BẤM NHANH QUÁ! BỊ PHẠT THÊM 1 LẦN TROLL! ⚡";
            trollCounter++;
            trollCountSpan.innerText = trollCounter;
        }
        lastClickTime = now;
        
        // Cuộn xuống message
        msgArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        
        // Đổi background body trong 0.2s
        document.body.style.background = `linear-gradient(135deg, #${Math.floor(Math.random()*16777215).toString(16)}, #${Math.floor(Math.random()*16777215).toString(16)})`;
        setTimeout(() => {
            document.body.style.background = "linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3)";
            document.body.style.backgroundSize = "400% 400%";
        }, 300);
    }
    
    // Reset game
    function resetGame() {
        trollCounter = 0;
        clickCount = 0;
        trollCountSpan.innerText = "0";
        msgArea.innerHTML = "💬 Đã RESET! Bắt đầu lại từ đầu...<br>⚠️ Nhưng đừng tưởng reset là hết troll nhé! 🤣";
        gameBox.classList.add('floating');
        setTimeout(() => gameBox.classList.remove('floating'), 500);
        
        // Hiệu ứng đặc biệt khi reset
        const surprise = document.createElement('div');
        surprise.innerText = "🧹 RESET THÀNH CÔNG! TINH THẦN ĐÃ ĐƯỢC LÀNH LẶNH 🧹";
        surprise.style.position = "fixed";
        surprise.style.top = "20%";
        surprise.style.left = "50%";
        surprise.style.transform = "translate(-50%, -50%)";
        surprise.style.backgroundColor = "gold";
        surprise.style.color = "black";
        surprise.style.padding = "10px 20px";
        surprise.style.borderRadius = "50px";
        surprise.style.fontWeight = "bold";
        surprise.style.zIndex = "9999";
        surprise.style.fontSize = "1.2em";
        document.body.appendChild(surprise);
        setTimeout(() => surprise.remove(), 2000);
    }
    
    // Nút bí mật (troll thêm)
    function surpriseTroll() {
        alert("🎁 BẤT NGỜ CHƯA? ĐÂY LÀ NÚT BÍ MẬT!\nBạn vừa bị +5 lần troll vì tò mò!");
        trollCounter += 5;
        trollCountSpan.innerText = trollCounter;
        msgArea.innerHTML += "<br>🎁 Bạn đã kích hoạt nút bí mật! +5 troll! 🤣";
        trollEffect();
    }
    
    mainBtn.addEventListener('click', onMainButtonClick);
    resetBtn.addEventListener('click', resetGame);
    surpriseBtn.addEventListener('click', surpriseTroll);
    
    // Thêm tooltip cho nút chính (cũng troll)
    setInterval(() => {
        const tips = ["Bấm thử đi!", "Không đau đâu!", "Troll nhẹ thôi", "Đảm bảo vui", "Coi chừng nghiện"];
        mainBtn.title = tips[Math.floor(Math.random() * tips.length)];
    }, 3000);
    
    console.log("%c🔥 GAME TROLL SIÊU HÀI ĐÃ SẴN SÀNG! BẤM THỬ ĐI 🔥", "color: orange; font-size: 16px");
    console.log("%c⚠️ CẢNH BÁO: ĐỪNG CÓ BẤM NHIỀU QUÁ KẺO... CƯỜI CHẾT! ⚠️", "color: red; font-size: 14px");
</script>
</body>
</html>
