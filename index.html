<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lớp 8E - Discord Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            scrollbar-width: thin;
        }
        .bg-discord-dark { background-color: #36393f; }
        .bg-discord-sidebar { background-color: #2f3136; }
        .bg-discord-channel { background-color: #2f3136; }
        .bg-discord-input { background-color: #40444b; }
        .bg-discord-hover:hover { background-color: #3a3d44; }
        .text-discord-muted { color: #8e9297; }
        .border-discord { border-color: #202225; }
        .online-dot { background-color: #23a55a; }
        .message:hover { background-color: #32353b; }
        .active-channel { background-color: #393c43; }
    </style>
</head>
<body class="bg-discord-dark text-white">
    <div id="app"></div>

    <script>
        // ==================== KHỞI TẠO DỮ LIỆU ====================
        let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        let users = JSON.parse(localStorage.getItem('users') || '[]');
        let messages = JSON.parse(localStorage.getItem('messages') || '[]');
        let currentChannel = 'general';
        
        // Tạo tài khoản mặc định nếu chưa có
        if (users.length === 0) {
            users = [
                { id: '1', username: 'cogiaochunhiem', password: '123456', role: 'teacher', avatar: '👩‍🏫', createdAt: new Date().toISOString() },
                { id: '2', username: 'hocsinh1', password: '123456', role: 'student', avatar: '👨‍🎓', createdAt: new Date().toISOString() }
            ];
            localStorage.setItem('users', JSON.stringify(users));
        }
        
        // Tin nhắn mặc định
        if (messages.length === 0) {
            messages = [
                { id: '1', username: 'cogiaochunhiem', content: 'Chào mừng các em đến với lớp 8E! 📚', channel: 'general', timestamp: new Date(Date.now() - 3600000).toISOString(), avatar: '👩‍🏫' },
                { id: '2', username: 'cogiaochunhiem', content: 'Đây là nơi chúng ta sẽ trao đổi bài tập và thông tin lớp nhé!', channel: 'general', timestamp: new Date(Date.now() - 3500000).toISOString(), avatar: '👩‍🏫' },
                { id: '3', username: 'hocsinh1', content: 'Dạ vâng ạ! Em chào cô và các bạn 👋', channel: 'general', timestamp: new Date(Date.now() - 3400000).toISOString(), avatar: '👨‍🎓' }
            ];
            localStorage.setItem('messages', JSON.stringify(messages));
        }
        
        // ==================== HÀM TIỆN ÍCH ====================
        function saveData() {
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('messages', JSON.stringify(messages));
            if (currentUser) {
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
            } else {
                localStorage.removeItem('currentUser');
            }
        }
        
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return 'Vừa xong';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} phút trước`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)} giờ trước`;
            return date.toLocaleDateString('vi-VN');
        }
        
        // ==================== COMPONENTS ====================
        
        // Màn hình đăng nhập
        function LoginScreen() {
            return `
                <div class="min-h-screen bg-gradient-to-br from-[#5865F2] to-[#4752C4] flex items-center justify-center p-4">
                    <div class="bg-[#36393f] rounded-lg w-full max-w-md p-8 shadow-2xl">
                        <div class="text-center mb-8">
                            <div class="text-5xl mb-3">📚</div>
                            <h1 class="text-3xl font-bold text-white">Lớp 8E</h1>
                            <p class="text-discord-muted mt-2">Đăng nhập để vào lớp học</p>
                        </div>
                        
                        <form id="loginForm">
                            <div class="mb-4">
                                <label class="block text-xs font-semibold uppercase text-discord-muted mb-1">Tên đăng nhập</label>
                                <input type="text" id="loginUsername" class="w-full bg-[#202225] text-white rounded p-3 outline-none focus:ring-2 focus:ring-[#5865F2]" placeholder="cogiaochunhiem hoặc hocsinh1">
                            </div>
                            <div class="mb-6">
                                <label class="block text-xs font-semibold uppercase text-discord-muted mb-1">Mật khẩu</label>
                                <input type="password" id="loginPassword" class="w-full bg-[#202225] text-white rounded p-3 outline-none focus:ring-2 focus:ring-[#5865F2]" placeholder="••••••">
                            </div>
                            <button type="submit" class="w-full bg-[#5865F2] hover:bg-[#4752C4] text-white font-semibold py-3 rounded transition">Đăng nhập</button>
                        </form>
                        
                        <div class="text-center mt-6">
                            <span class="text-discord-muted">Chưa có tài khoản? </span>
                            <button id="showRegisterBtn" class="text-[#5865F2] hover:underline">Đăng ký</button>
                        </div>
                        
                        <div class="mt-4 p-3 bg-[#202225] rounded text-xs text-discord-muted">
                            <p class="font-semibold mb-1">📝 Tài khoản mặc định:</p>
                            <p>👩‍🏫 Giáo viên: cogiaochunhiem / 123456</p>
                            <p>👨‍🎓 Học sinh: hocsinh1 / 123456</p>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Màn hình đăng ký
        function RegisterScreen() {
            return `
                <div class="min-h-screen bg-gradient-to-br from-[#5865F2] to-[#4752C4] flex items-center justify-center p-4">
                    <div class="bg-[#36393f] rounded-lg w-full max-w-md p-8 shadow-2xl">
                        <div class="text-center mb-8">
                            <div class="text-5xl mb-3">📝</div>
                            <h1 class="text-3xl font-bold text-white">Đăng ký</h1>
                            <p class="text-discord-muted mt-2">Tham gia Lớp 8E</p>
                        </div>
                        
                        <form id="registerForm">
                            <div class="mb-4">
                                <label class="block text-xs font-semibold uppercase text-discord-muted mb-1">Tên đăng nhập</label>
                                <input type="text" id="regUsername" class="w-full bg-[#202225] text-white rounded p-3 outline-none focus:ring-2 focus:ring-[#5865F2]" placeholder="tencuaban" required>
                            </div>
                            <div class="mb-4">
                                <label class="block text-xs font-semibold uppercase text-discord-muted mb-1">Mật khẩu</label>
                                <input type="password" id="regPassword" class="w-full bg-[#202225] text-white rounded p-3 outline-none focus:ring-2 focus:ring-[#5865F2]" placeholder="••••••" required>
                            </div>
                            <div class="mb-6">
                                <label class="block text-xs font-semibold uppercase text-discord-muted mb-1">Xác nhận mật khẩu</label>
                                <input type="password" id="regConfirmPassword" class="w-full bg-[#202225] text-white rounded p-3 outline-none focus:ring-2 focus:ring-[#5865F2]" placeholder="••••••" required>
                            </div>
                            <button type="submit" class="w-full bg-[#5865F2] hover:bg-[#4752C4] text-white font-semibold py-3 rounded transition">Đăng ký</button>
                        </form>
                        
                        <div class="text-center mt-6">
                            <span class="text-discord-muted">Đã có tài khoản? </span>
                            <button id="showLoginBtn" class="text-[#5865F2] hover:underline">Đăng nhập</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Giao diện chat chính (Discord-like)
        function ChatScreen() {
            const channelMessages = messages.filter(m => m.channel === currentChannel);
            const isTeacher = currentUser?.role === 'teacher';
            
            return `
                <div class="flex h-screen">
                    <!-- Sidebar trái -->
                    <div class="w-64 bg-discord-sidebar flex flex-col">
                        <div class="p-3 shadow-md border-b border-[#202225]">
                            <h1 class="text-lg font-bold">📚 Lớp 8E</h1>
                            <div class="flex items-center mt-2 text-sm">
                                <div class="w-2 h-2 online-dot rounded-full mr-2"></div>
                                <span class="text-gray-300">${currentUser?.username || ''}</span>
                                ${isTeacher ? '<span class="ml-2 text-xs bg-[#5865F2] px-1 rounded">GV</span>' : ''}
                            </div>
                        </div>
                        
                        <div class="flex-1 overflow-y-auto p-2">
                            <div class="text-xs uppercase text-discord-muted font-semibold mb-2 px-2">Kênh văn bản</div>
                            
                            <div class="channel-item ${currentChannel === 'general' ? 'active-channel' : ''} p-2 rounded cursor-pointer flex items-center hover:bg-[#3a3d44] transition" data-channel="general">
                                <span class="mr-2">#</span>
                                <span class="flex-1">chung</span>
                                <span class="text-xs text-discord-muted">${messages.filter(m => m.channel === 'general').length}</span>
                            </div>
                            
                            <div class="channel-item ${currentChannel === 'homework' ? 'active-channel' : ''} p-2 rounded cursor-pointer flex items-center hover:bg-[#3a3d44] transition" data-channel="homework">
                                <span class="mr-2">📝</span>
                                <span class="flex-1">bài tập</span>
                                <span class="text-xs text-discord-muted">${messages.filter(m => m.channel === 'homework').length}</span>
                            </div>
                            
                            <div class="channel-item ${currentChannel === 'announcements' ? 'active-channel' : ''} p-2 rounded cursor-pointer flex items-center hover:bg-[#3a3d44] transition" data-channel="announcements">
                                <span class="mr-2">📢</span>
                                <span class="flex-1">thông báo</span>
                                <span class="text-xs text-discord-muted">${messages.filter(m => m.channel === 'announcements').length}</span>
                            </div>
                            
                            <div class="channel-item ${currentChannel === 'random' ? 'active-channel' : ''} p-2 rounded cursor-pointer flex items-center hover:bg-[#3a3d44] transition" data-channel="random">
                                <span class="mr-2">🎮</span>
                                <span class="flex-1">random</span>
                                <span class="text-xs text-discord-muted">${messages.filter(m => m.channel === 'random').length}</span>
                            </div>
                        </div>
                        
                        <div class="p-3 border-t border-[#202225]">
                            <button id="logoutBtn" class="w-full text-left text-discord-muted hover:text-white text-sm py-1 flex items-center">
                                <span class="mr-2">🚪</span> Đăng xuất
                            </button>
                        </div>
                    </div>
                    
                    <!-- Khu vực chat chính -->
                    <div class="flex-1 flex flex-col bg-discord-dark">
                        <!-- Header channel -->
                        <div class="h-12 shadow-sm border-b border-[#202225] flex items-center px-4">
                            <span class="text-xl mr-2">${currentChannel === 'general' ? '#' : currentChannel === 'homework' ? '📝' : currentChannel === 'announcements' ? '📢' : '🎮'}</span>
                            <span class="font-semibold">${getChannelName(currentChannel)}</span>
                            <span class="text-discord-muted text-sm ml-2">· ${channelMessages.length} tin nhắn</span>
                        </div>
                        
                        <!-- Danh sách tin nhắn -->
                        <div id="messagesContainer" class="flex-1 overflow-y-auto p-4 space-y-2">
                            ${channelMessages.map(msg => `
                                <div class="message flex items-start hover:bg-[#32353b] p-2 rounded transition group">
                                    <div class="text-3xl mr-3">${getUserAvatar(msg.username)}</div>
                                    <div class="flex-1">
                                        <div class="flex items-baseline gap-2">
                                            <span class="font-semibold hover:underline cursor-pointer">${msg.username}</span>
                                            <span class="text-xs text-discord-muted">${formatTime(msg.timestamp)}</span>
                                            ${msg.username === currentUser?.username ? `<button class="delete-msg opacity-0 group-hover:opacity-100 text-red-400 text-xs ml-2" data-msg-id="${msg.id}">🗑️</button>` : ''}
                                        </div>
                                        <div class="text-gray-200 break-words">${escapeHtml(msg.content)}</div>
                                    </div>
                                </div>
                            `).reverse().join('')}
                            ${channelMessages.length === 0 ? '<div class="text-center text-discord-muted py-10">✨ Chưa có tin nhắn nào. Hãy gửi tin nhắn đầu tiên!</div>' : ''}
                        </div>
                        
                        <!-- Ô nhập tin nhắn -->
                        <div class="p-4">
                            <div class="bg-discord-input rounded-lg flex items-center">
                                <input type="text" id="messageInput" class="flex-1 bg-transparent text-white p-3 outline-none" placeholder="Nhập tin nhắn... ${isTeacher ? '(Giáo viên có thể @mọi người)' : ''}" autocomplete="off">
                                <button id="sendBtn" class="bg-[#5865F2] hover:bg-[#4752C4] text-white px-4 py-2 m-1 rounded transition">
                                    Gửi
                                </button>
                            </div>
                            <div class="text-xs text-discord-muted mt-2">
                                ${isTeacher ? '🔔 Bạn là giáo viên - tin nhắn của bạn sẽ được đánh dấu' : '💬 Hãy tương tác lịch sự nhé!'}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function getChannelName(channel) {
            const names = {
                general: 'chung',
                homework: 'bài tập',
                announcements: 'thông báo',
                random: 'random'
            };
            return names[channel] || channel;
        }
        
        function getUserAvatar(username) {
            const user = users.find(u => u.username === username);
            if (user && user.avatar) return user.avatar;
            if (username === 'cogiaochunhiem') return '👩‍🏫';
            return '👨‍🎓';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ==================== XỬ LÝ SỰ KIỆN ====================
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content) return;
            
            const newMessage = {
                id: Date.now().toString(),
                username: currentUser.username,
                content: content,
                channel: currentChannel,
                timestamp: new Date().toISOString(),
                avatar: getUserAvatar(currentUser.username)
            };
            
            messages.push(newMessage);
            saveData();
            input.value = '';
            renderApp();
            
            // Auto scroll
            setTimeout(() => {
                const container = document.getElementById('messagesContainer');
                if (container) container.scrollTop = container.scrollHeight;
            }, 100);
        }
        
        function deleteMessage(msgId) {
            messages = messages.filter(m => m.id !== msgId);
            saveData();
            renderApp();
        }
        
        function logout() {
            currentUser = null;
            saveData();
            renderApp();
        }
        
        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            const user = users.find(u => u.username === username && u.password === password);
            if (user) {
                currentUser = { id: user.id, username: user.username, role: user.role, avatar: user.avatar };
                saveData();
                renderApp();
            } else {
                alert('Sai tên đăng nhập hoặc mật khẩu!');
            }
        }
        
        function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            
            if (!username || !password) {
                alert('Vui lòng nhập đầy đủ thông tin!');
                return;
            }
            
            if (password !== confirm) {
                alert('Mật khẩu xác nhận không khớp!');
                return;
            }
            
            if (users.find(u => u.username === username)) {
                alert('Tên đăng nhập đã tồn tại!');
                return;
            }
            
            const newUser = {
                id: Date.now().toString(),
                username: username,
                password: password,
                role: 'student',
                avatar: '👨‍🎓',
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            saveData();
            
            alert('Đăng ký thành công! Vui lòng đăng nhập.');
            renderApp();
        }
        
        // ==================== RENDER CHÍNH ====================
        
        function renderApp() {
            const app = document.getElementById('app');
            let html = '';
            
            if (!currentUser) {
                // Kiểm tra xem đang ở màn hình đăng ký hay đăng nhập
                const showRegister = window._showRegister || false;
                if (showRegister) {
                    html = RegisterScreen();
                } else {
                    html = LoginScreen();
                }
            } else {
                html = ChatScreen();
            }
            
            app.innerHTML = html;
            
            // Gắn sự kiện sau khi render
            if (!currentUser) {
                const loginForm = document.getElementById('loginForm');
                if (loginForm) {
                    loginForm.addEventListener('submit', handleLogin);
                }
                
                const registerForm = document.getElementById('registerForm');
                if (registerForm) {
                    registerForm.addEventListener('submit', handleRegister);
                }
                
                const showRegisterBtn = document.getElementById('showRegisterBtn');
                if (showRegisterBtn) {
                    showRegisterBtn.addEventListener('click', () => {
                        window._showRegister = true;
                        renderApp();
                    });
                }
                
                const showLoginBtn = document.getElementById('showLoginBtn');
                if (showLoginBtn) {
                    showLoginBtn.addEventListener('click', () => {
                        window._showRegister = false;
                        renderApp();
                    });
                }
            } else {
                // Gắn sự kiện chat
                const sendBtn = document.getElementById('sendBtn');
                const messageInput = document.getElementById('messageInput');
                
                if (sendBtn) {
                    sendBtn.addEventListener('click', sendMessage);
                }
                if (messageInput) {
                    messageInput.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') sendMessage();
                    });
                }
                
                const logoutBtn = document.getElementById('logoutBtn');
                if (logoutBtn) {
                    logoutBtn.addEventListener('click', logout);
                }
                
                // Gắn sự kiện chuyển kênh
                document.querySelectorAll('.channel-item').forEach(el => {
                    el.addEventListener('click', (e) => {
                        const channel = el.dataset.channel;
                        if (channel) {
                            currentChannel = channel;
                            renderApp();
                        }
                    });
                });
                
                // Gắn sự kiện xóa tin nhắn
                document.querySelectorAll('.delete-msg').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const msgId = btn.dataset.msgId;
                        if (confirm('Bạn có chắc muốn xóa tin nhắn này?')) {
                            deleteMessage(msgId);
                        }
                    });
                });
                
                // Auto scroll xuống cuối
                const container = document.getElementById('messagesContainer');
                if (container) {
                    container.scrollTop = container.scrollHeight;
                }
            }
        }
        
        // Khởi chạy ứng dụng
        renderApp();
    </script>
</body>
</html>
