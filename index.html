<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8E Social - Discord + Facebook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: #1e1f22;
        }
        
        /* Discord style scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1e1f22;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #1a1b1e;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #2b2d31;
        }
        
        /* Server icon */
        .server-icon {
            transition: all 0.2s ease;
            border-radius: 50%;
        }
        
        .server-icon:hover {
            border-radius: 16px;
            background: #5865F2;
        }
        
        .server-icon.active {
            border-radius: 16px;
            background: #5865F2;
        }
        
        /* Channel item */
        .channel-item {
            transition: all 0.1s ease;
        }
        
        .channel-item:hover {
            background: #2b2d31;
        }
        
        .channel-active {
            background: #2b2d31;
        }
        
        /* Message */
        .message:hover {
            background: #2b2d31;
        }
        
        /* Friend card */
        .friend-card {
            transition: all 0.2s ease;
        }
        
        .friend-card:hover {
            background: #2b2d31;
            transform: translateX(4px);
        }
        
        /* Modal */
        .modal-overlay {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .modal-animation {
            animation: fadeIn 0.2s ease-out;
        }
        
        /* Mention highlight */
        .mention {
            background: #5865F2;
            color: white;
            border-radius: 4px;
            padding: 0 2px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ==================== DỮ LIỆU ====================
        let currentUser = null;
        let users = [];
        let servers = [];
        let posts = [];
        let friendRequests = [];
        let currentServer = null;
        let currentChannel = null;
        let currentView = 'welcome'; // welcome, login, register, feed, server, friends
        
        // Load/Save
        function loadData() {
            const savedUser = localStorage.getItem('8e_currentUser');
            if (savedUser && savedUser !== 'null') {
                try {
                    currentUser = JSON.parse(savedUser);
                } catch(e) { currentUser = null; }
            } else {
                currentUser = null;
            }
            
            users = JSON.parse(localStorage.getItem('8e_users') || '[]');
            servers = JSON.parse(localStorage.getItem('8e_servers') || '[]');
            posts = JSON.parse(localStorage.getItem('8e_posts') || '[]');
            friendRequests = JSON.parse(localStorage.getItem('8e_friendRequests') || '[]');
        }
        
        function saveData() {
            localStorage.setItem('8e_currentUser', JSON.stringify(currentUser));
            localStorage.setItem('8e_users', JSON.stringify(users));
            localStorage.setItem('8e_servers', JSON.stringify(servers));
            localStorage.setItem('8e_posts', JSON.stringify(posts));
            localStorage.setItem('8e_friendRequests', JSON.stringify(friendRequests));
        }
        
        // Helper
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return 'vừa xong';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} phút trước`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)} giờ trước`;
            return date.toLocaleDateString('vi-VN');
        }
        
        function getUserById(userId) {
            return users.find(u => u.id === userId);
        }
        
        function isFriend(userId) {
            if (!currentUser) return false;
            const user = users.find(u => u.id === currentUser.id);
            return user?.friends?.includes(userId) || false;
        }
        
        function hasSentRequest(toUserId) {
            return friendRequests.some(r => r.fromUserId === currentUser?.id && r.toUserId === toUserId && r.status === 'pending');
        }
        
        function hasReceivedRequest(fromUserId) {
            return friendRequests.some(r => r.fromUserId === fromUserId && r.toUserId === currentUser?.id && r.status === 'pending');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ==================== AUTH ====================
        function handleRegister(e) {
            e.preventDefault();
            const fullName = document.getElementById('regFullName').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            
            if (!fullName || !username || !password) {
                alert('❌ Vui lòng nhập đầy đủ thông tin!');
                return;
            }
            
            if (password !== confirm) {
                alert('❌ Mật khẩu xác nhận không khớp!');
                return;
            }
            
            if (password.length < 4) {
                alert('❌ Mật khẩu phải có ít nhất 4 ký tự!');
                return;
            }
            
            if (users.find(u => u.username === username)) {
                alert('❌ Tên đăng nhập đã tồn tại!');
                return;
            }
            
            const newUser = {
                id: Date.now().toString(),
                fullName: fullName,
                username: username,
                password: password,
                avatar: `https://ui-avatars.com/api/?background=5865F2&color=fff&name=${encodeURIComponent(fullName)}`,
                bio: 'Học sinh lớp 8E 🎓',
                friends: [],
                servers: [],
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            saveData();
            
            alert('✅ Đăng ký thành công! Vui lòng đăng nhập.');
            currentView = 'login';
            renderApp();
        }
        
        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            const user = users.find(u => u.username === username && u.password === password);
            if (user) {
                currentUser = { ...user };
                delete currentUser.password;
                saveData();
                currentView = 'feed';
                renderApp();
            } else {
                alert('❌ Sai tên đăng nhập hoặc mật khẩu!');
            }
        }
        
        function logout() {
            currentUser = null;
            saveData();
            currentView = 'welcome';
            renderApp();
        }
        
        // ==================== FRIEND ACTIONS ====================
        function sendFriendRequest(userId) {
            if (!currentUser) return;
            if (isFriend(userId)) {
                alert('Các bạn đã là bạn bè rồi!');
                return;
            }
            if (hasSentRequest(userId)) {
                alert('Đã gửi lời mời kết bạn rồi!');
                return;
            }
            
            friendRequests.push({
                id: Date.now().toString(),
                fromUserId: currentUser.id,
                toUserId: userId,
                status: 'pending',
                createdAt: new Date().toISOString()
            });
            saveData();
            renderApp();
        }
        
        function acceptFriendRequest(requestId, fromUserId) {
            friendRequests = friendRequests.filter(r => r.id !== requestId);
            
            const currentUserData = users.find(u => u.id === currentUser.id);
            const fromUserData = users.find(u => u.id === fromUserId);
            
            if (!currentUserData.friends) currentUserData.friends = [];
            if (!fromUserData.friends) fromUserData.friends = [];
            
            currentUserData.friends.push(fromUserId);
            fromUserData.friends.push(currentUser.id);
            
            currentUser = { ...currentUserData };
            delete currentUser.password;
            
            saveData();
            renderApp();
        }
        
        function rejectFriendRequest(requestId) {
            friendRequests = friendRequests.filter(r => r.id !== requestId);
            saveData();
            renderApp();
        }
        
        // ==================== SERVER ACTIONS ====================
        function createServer() {
            if (!currentUser) return;
            
            const name = prompt('🏷️ Tên server:', `Server của ${currentUser.fullName}`);
            if (!name) return;
            
            const inviteCode = Math.random().toString(36).substring(2, 10).toUpperCase();
            
            const newServer = {
                id: Date.now().toString(),
                name: name,
                ownerId: currentUser.id,
                members: [currentUser.id],
                inviteCode: inviteCode,
                channels: [
                    { id: 'general', name: 'chung', type: 'text' },
                    { id: 'announcements', name: 'thông-báo', type: 'text' }
                ],
                messages: [],
                createdAt: new Date().toISOString()
            };
            
            servers.push(newServer);
            
            const userData = users.find(u => u.id === currentUser.id);
            if (!userData.servers) userData.servers = [];
            userData.servers.push(newServer.id);
            
            currentUser = { ...userData };
            delete currentUser.password;
            
            saveData();
            
            const link = `${window.location.origin}${window.location.pathname}?invite=${inviteCode}`;
            alert(`✅ Đã tạo server "${name}"!\n\n🔗 Link mời: ${link}\n📋 Mã mời: ${inviteCode}`);
            
            currentServer = newServer;
            currentChannel = 'general';
            currentView = 'server';
            renderApp();
        }
        
        function joinServerByCode() {
            const code = prompt('🔑 Nhập mã mời server:');
            if (!code) return;
            
            const server = servers.find(s => s.inviteCode === code.toUpperCase());
            if (!server) {
                alert('❌ Mã mời không hợp lệ!');
                return;
            }
            
            if (server.members.includes(currentUser.id)) {
                alert('Bạn đã ở trong server này rồi!');
                return;
            }
            
            server.members.push(currentUser.id);
            
            const userData = users.find(u => u.id === currentUser.id);
            if (!userData.servers) userData.servers = [];
            userData.servers.push(server.id);
            
            currentUser = { ...userData };
            delete currentUser.password;
            
            saveData();
            alert(`✅ Đã tham gia server "${server.name}"!`);
            
            currentServer = server;
            currentChannel = 'general';
            currentView = 'server';
            renderApp();
        }
        
        // ==================== CHAT IN SERVER ====================
        function sendServerMessage() {
            const input = document.getElementById('serverMessageInput');
            if (!input) return;
            const content = input.value.trim();
            if (!content) return;
            
            const server = servers.find(s => s.id === currentServer.id);
            if (!server) return;
            
            // Handle mentions
            let processedContent = content;
            const mentionMatches = content.match(/@(\w+)/g);
            if (mentionMatches) {
                mentionMatches.forEach(mention => {
                    const username = mention.substring(1);
                    const user = users.find(u => u.username === username);
                    if (user && server.members.includes(user.id)) {
                        processedContent = processedContent.replace(mention, `<span class="mention">@${username}</span>`);
                    }
                });
            }
            
            const newMessage = {
                id: Date.now().toString(),
                userId: currentUser.id,
                userName: currentUser.fullName,
                userAvatar: currentUser.avatar,
                content: processedContent,
                rawContent: content,
                channelId: currentChannel,
                timestamp: new Date().toISOString(),
                mentions: mentionMatches || []
            };
            
            if (!server.messages) server.messages = [];
            server.messages.push(newMessage);
            saveData();
            
            input.value = '';
            renderApp();
            
            setTimeout(() => {
                const container = document.getElementById('serverMessages');
                if (container) container.scrollTop = container.scrollHeight;
            }, 100);
        }
        
        // ==================== POST ACTIONS ====================
        function createPost(content) {
            if (!content.trim()) return;
            
            const newPost = {
                id: Date.now().toString(),
                userId: currentUser.id,
                userName: currentUser.fullName,
                userAvatar: currentUser.avatar,
                content: content,
                likes: [],
                comments: [],
                createdAt: new Date().toISOString()
            };
            
            posts.unshift(newPost);
            saveData();
            renderApp();
        }
        
        function likePost(postId) {
            const post = posts.find(p => p.id === postId);
            if (!post) return;
            
            if (post.likes.includes(currentUser.id)) {
                post.likes = post.likes.filter(id => id !== currentUser.id);
            } else {
                post.likes.push(currentUser.id);
            }
            saveData();
            renderApp();
        }
        
        function addComment(postId, content) {
            if (!content.trim()) return;
            
            const post = posts.find(p => p.id === postId);
            if (!post) return;
            
            post.comments.push({
                id: Date.now().toString(),
                userId: currentUser.id,
                userName: currentUser.fullName,
                userAvatar: currentUser.avatar,
                content: content,
                createdAt: new Date().toISOString()
            });
            saveData();
            renderApp();
        }
        
        // ==================== PROFILE ====================
        function updateProfile() {
            const newBio = document.getElementById('editBio')?.value;
            const newFullName = document.getElementById('editFullName')?.value;
            const newAvatar = document.getElementById('editAvatar')?.value;
            
            if (newFullName) currentUser.fullName = newFullName;
            if (newBio) currentUser.bio = newBio;
            if (newAvatar && newAvatar.trim()) currentUser.avatar = newAvatar;
            
            const userData = users.find(u => u.id === currentUser.id);
            userData.fullName = currentUser.fullName;
            userData.bio = currentUser.bio;
            if (newAvatar && newAvatar.trim()) userData.avatar = currentUser.avatar;
            
            saveData();
            alert('✅ Cập nhật trang cá nhân thành công!');
            currentView = 'profile';
            renderApp();
        }
        
        // ==================== TÌM KIẾM BẠN BÈ ====================
        let searchQuery = '';
        
        function searchFriends() {
            searchQuery = document.getElementById('searchInput')?.value.toLowerCase() || '';
            renderApp();
        }
        
        // ==================== GIAO DIỆN ====================
        
        // Màn hình chào mừng
        function WelcomeScreen() {
            return `
                <div class="min-h-screen bg-gradient-to-br from-[#5865F2] to-[#4752C4] flex items-center justify-center p-4">
                    <div class="max-w-md w-full text-center">
                        <div class="text-7xl mb-6">🎓</div>
                        <h1 class="text-4xl font-bold text-white mb-2">8E Social</h1>
                        <p class="text-white/80 mb-8">Mạng xã hội dành riêng cho lớp 8E</p>
                        <div class="space-y-3">
                            <button id="loginBtn" class="w-full bg-white text-[#5865F2] py-3 rounded-xl font-semibold hover:shadow-lg transition">Đăng nhập</button>
                            <button id="registerBtn" class="w-full bg-transparent border-2 border-white text-white py-3 rounded-xl font-semibold hover:bg-white/10 transition">Đăng ký</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Đăng nhập/Đăng ký (giữ nguyên)
        function LoginScreen() {
            return `
                <div class="min-h-screen bg-gradient-to-br from-[#5865F2] to-[#4752C4] flex items-center justify-center p-4">
                    <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl">
                        <div class="text-center mb-6">
                            <h2 class="text-2xl font-bold text-gray-800">Đăng nhập 8E Social</h2>
                            <p class="text-gray-500 text-sm mt-1">Chào mừng bạn trở lại!</p>
                        </div>
                        <form id="loginForm">
                            <input type="text" id="loginUsername" placeholder="Tên đăng nhập" class="w-full p-3 border rounded-xl mb-3 focus:outline-none focus:ring-2 focus:ring-[#5865F2]">
                            <input type="password" id="loginPassword" placeholder="Mật khẩu" class="w-full p-3 border rounded-xl mb-4 focus:outline-none focus:ring-2 focus:ring-[#5865F2]">
                            <button type="submit" class="w-full bg-[#5865F2] text-white py-3 rounded-xl font-semibold hover:bg-[#4752C4] transition">Đăng nhập</button>
                        </form>
                        <p class="text-center text-gray-500 text-sm mt-4">
                            Chưa có tài khoản? 
                            <button id="switchToRegister" class="text-[#5865F2] font-semibold">Đăng ký</button>
                        </p>
                    </div>
                </div>
            `;
        }
        
        function RegisterScreen() {
            return `
                <div class="min-h-screen bg-gradient-to-br from-[#5865F2] to-[#4752C4] flex items-center justify-center p-4">
                    <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl">
                        <div class="text-center mb-6">
                            <h2 class="text-2xl font-bold text-gray-800">Tham gia 8E Social</h2>
                            <p class="text-gray-500 text-sm mt-1">Tạo tài khoản mới</p>
                        </div>
                        <form id="registerForm">
                            <input type="text" id="regFullName" placeholder="Họ và tên" class="w-full p-3 border rounded-xl mb-3 focus:outline-none focus:ring-2 focus:ring-[#5865F2]">
                            <input type="text" id="regUsername" placeholder="Tên đăng nhập" class="w-full p-3 border rounded-xl mb-3 focus:outline-none focus:ring-2 focus:ring-[#5865F2]">
                            <input type="password" id="regPassword" placeholder="Mật khẩu" class="w-full p-3 border rounded-xl mb-3 focus:outline-none focus:ring-2 focus:ring-[#5865F2]">
                            <input type="password" id="regConfirmPassword" placeholder="Xác nhận mật khẩu" class="w-full p-3 border rounded-xl mb-4 focus:outline-none focus:ring-2 focus:ring-[#5865F2]">
                            <button type="submit" class="w-full bg-[#5865F2] text-white py-3 rounded-xl font-semibold hover:bg-[#4752C4] transition">Đăng ký</button>
                        </form>
                        <p class="text-center text-gray-500 text-sm mt-4">
                            Đã có tài khoản? 
                            <button id="switchToLogin" class="text-[#5865F2] font-semibold">Đăng nhập</button>
                        </p>
                    </div>
                </div>
            `;
        }
        
        // Màn hình tìm bạn bè
        function FriendsView() {
            const allUsers = users.filter(u => u.id !== currentUser.id);
            const filteredUsers = searchQuery ? allUsers.filter(u => 
                u.fullName.toLowerCase().includes(searchQuery) || 
                u.username.toLowerCase().includes(searchQuery)
            ) : allUsers;
            
            const friendList = users.filter(u => currentUser.friends?.includes(u.id));
            const pendingRequests = friendRequests.filter(r => r.toUserId === currentUser.id && r.status === 'pending');
            
            return `
                <div class="min-h-screen bg-[#1e1f22]">
                    <!-- Header -->
                    <div class="bg-[#2b2d31] shadow-sm sticky top-0 z-10">
                        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <button id="backToFeed" class="text-gray-400 hover:text-white"><i class="fas fa-arrow-left text-xl"></i></button>
                                <div class="text-xl font-bold bg-gradient-to-r from-[#5865F2] to-[#EB459E] bg-clip-text text-transparent">8E Social</div>
                            </div>
                            <div class="flex items-center gap-3">
                                <button id="feedNavBtn" class="text-gray-400 hover:text-white"><i class="fas fa-newspaper text-xl"></i></button>
                                <button id="serversNavBtn" class="text-gray-400 hover:text-white"><i class="fas fa-server text-xl"></i></button>
                                <button id="profileNavBtn" class="flex items-center gap-2">
                                    <img src="${currentUser.avatar}" class="w-8 h-8 rounded-full object-cover">
                                </button>
                                <button id="logoutBtn" class="text-gray-400 hover:text-white"><i class="fas fa-sign-out-alt text-xl"></i></button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="max-w-4xl mx-auto p-6">
                        <!-- Search bar -->
                        <div class="bg-[#2b2d31] rounded-xl p-4 mb-6">
                            <div class="flex gap-3">
                                <input type="text" id="searchInput" placeholder="🔍 Tìm bạn bè theo tên..." class="flex-1 bg-[#1e1f22] text-white p-3 rounded-lg outline-none focus:ring-2 focus:ring-[#5865F2]" value="${searchQuery}">
                                <button id="searchBtn" class="bg-[#5865F2] text-white px-6 rounded-lg hover:bg-[#4752C4]">Tìm</button>
                            </div>
                        </div>
                        
                        <!-- Friend requests -->
                        ${pendingRequests.length > 0 ? `
                            <div class="bg-[#2b2d31] rounded-xl p-4 mb-6">
                                <h3 class="text-white font-semibold mb-3">📨 Lời mời kết bạn</h3>
                                ${pendingRequests.map(req => {
                                    const fromUser = getUserById(req.fromUserId);
                                    return `
                                        <div class="friend-card flex items-center justify-between p-3 rounded-lg">
                                            <div class="flex items-center gap-3">
                                                <img src="${fromUser.avatar}" class="w-12 h-12 rounded-full object-cover">
                                                <div>
                                                    <p class="text-white font-medium">${fromUser.fullName}</p>
                                                    <p class="text-gray-400 text-sm">@${fromUser.username}</p>
                                                </div>
                                            </div>
                                            <div class="flex gap-2">
                                                <button class="accept-friend px-4 py-1 bg-[#5865F2] text-white rounded-full text-sm" data-request-id="${req.id}" data-user-id="${req.fromUserId}">Đồng ý</button>
                                                <button class="reject-friend px-4 py-1 bg-gray-600 text-white rounded-full text-sm" data-request-id="${req.id}">Từ chối</button>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        ` : ''}
                        
                        <!-- Kết quả tìm kiếm -->
                        <div class="bg-[#2b2d31] rounded-xl p-4">
                            <h3 class="text-white font-semibold mb-3">👥 Kết quả tìm kiếm (${filteredUsers.length})</h3>
                            ${filteredUsers.length === 0 ? `
                                <p class="text-gray-400 text-center py-8">Không tìm thấy người dùng nào</p>
                            ` : `
                                <div class="space-y-2">
                                    ${filteredUsers.map(user => {
                                        const isFriend = isFriend(user.id);
                                        const sentRequest = hasSentRequest(user.id);
                                        const receivedRequest = hasReceivedRequest(user.id);
                                        return `
                                            <div class="friend-card flex items-center justify-between p-3 rounded-lg">
                                                <div class="flex items-center gap-3">
                                                    <img src="${user.avatar}" class="w-12 h-12 rounded-full object-cover">
                                                    <div>
                                                        <p class="text-white font-medium">${user.fullName}</p>
                                                        <p class="text-gray-400 text-sm">@${user.username}</p>
                                                    </div>
                                                </div>
                                                <div>
                                                    ${isFriend ? 
                                                        `<span class="text-green-400 text-sm"><i class="fas fa-check-circle"></i> Bạn bè</span>`
                                                        : sentRequest ?
                                                        `<span class="text-gray-400 text-sm">Đã gửi lời mời</span>`
                                                        : receivedRequest ?
                                                        `<div class="flex gap-2">
                                                            <button class="accept-friend px-3 py-1 bg-[#5865F2] text-white rounded-full text-sm" data-request-id="${receivedRequest}" data-user-id="${user.id}">Đồng ý</button>
                                                            <button class="reject-friend px-3 py-1 bg-gray-600 text-white rounded-full text-sm" data-request-id="${receivedRequest}">Từ chối</button>
                                                        </div>`
                                                        :
                                                        `<button class="add-friend-btn px-4 py-1 bg-[#5865F2] text-white rounded-full text-sm" data-user-id="${user.id}">
                                                            <i class="fas fa-user-plus"></i> Kết bạn
                                                        </button>`
                                                    }
                                                </div>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Giao diện server giống Discord
        function ServerView() {
            const server = servers.find(s => s.id === currentServer?.id);
            if (!server) {
                currentView = 'feed';
                renderApp();
                return '';
            }
            
            const channelMessages = server.messages?.filter(m => m.channelId === currentChannel) || [];
            const currentChannelInfo = server.channels.find(c => c.id === currentChannel);
            const isOwner = server.ownerId === currentUser.id;
            
            return `
                <div class="flex h-screen">
                    <!-- Server sidebar -->
                    <div class="w-60 bg-[#1e1f22] flex flex-col">
                        <div class="h-12 flex items-center px-4 shadow-md border-b border-[#2b2d31]">
                            <h2 class="text-white font-semibold">${server.name}</h2>
                        </div>
                        <div class="flex-1 overflow-y-auto p-2">
                            <div class="text-xs uppercase text-gray-400 font-semibold mb-2 px-2">Kênh văn bản</div>
                            ${server.channels.map(ch => `
                                <div class="channel-item ${currentChannel === ch.id ? 'channel-active' : ''} p-2 rounded cursor-pointer flex items-center gap-2" data-channel="${ch.id}">
                                    <span class="text-gray-400">#</span>
                                    <span class="text-gray-300 text-sm">${ch.name}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="p-3 border-t border-[#2b2d31]">
                            <div class="flex items-center gap-2 text-sm">
                                <img src="${currentUser.avatar}" class="w-8 h-8 rounded-full">
                                <div class="flex-1">
                                    <p class="text-white text-sm">${currentUser.fullName}</p>
                                    <p class="text-gray-400 text-xs">#${currentUser.username}</p>
                                </div>
                                <button id="leaveServerBtn" class="text-gray-400 hover:text-red-400"><i class="fas fa-sign-out-alt"></i></button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Chat area -->
                    <div class="flex-1 flex flex-col bg-[#2b2d31]">
                        <div class="h-12 flex items-center px-4 shadow-sm border-b border-[#1e1f22]">
                            <span class="text-gray-400">#</span>
                            <span class="text-white font-semibold ml-2">${currentChannelInfo?.name || currentChannel}</span>
                        </div>
                        
                        <div id="serverMessages" class="flex-1 overflow-y-auto p-4 space-y-2">
                            ${channelMessages.length === 0 ? `
                                <div class="text-center text-gray-400 py-20">
                                    <div class="text-6xl mb-4">💬</div>
                                    <p>Chưa có tin nhắn nào</p>
                                    <p class="text-sm">Hãy là người đầu tiên nhắn tin!</p>
                                </div>
                            ` : channelMessages.map(msg => `
                                <div class="message flex gap-3 p-2 rounded group">
                                    <img src="${msg.userAvatar}" class="w-10 h-10 rounded-full">
                                    <div class="flex-1">
                                        <div class="flex items-baseline gap-2">
                                            <span class="text-white font-semibold">${msg.userName}</span>
                                            <span class="text-gray-400 text-xs">${formatTime(msg.timestamp)}</span>
                                        </div>
                                        <div class="text-gray-200 break-words">${msg.content}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="p-4">
                            <div class="bg-[#1e1f22] rounded-lg flex items-center">
                                <input type="text" id="serverMessageInput" class="flex-1 bg-transparent text-white p-3 outline-none" placeholder="Nhập tin nhắn... (có thể @tên để mention)" autocomplete="off">
                                <button id="sendServerMsgBtn" class="bg-[#5865F2] text-white px-4 py-2 m-1 rounded transition">Gửi</button>
                            </div>
                            <p class="text-gray-500 text-xs mt-2">💡 Gợi ý: @tên_người_dùng để mention</p>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Feed view (giữ nguyên)
        function FeedView() {
            const friendList = users.filter(u => currentUser.friends?.includes(u.id));
            const myServers = servers.filter(s => s.members.includes(currentUser.id));
            const pendingRequests = friendRequests.filter(r => r.toUserId === currentUser.id && r.status === 'pending');
            
            return `
                <div class="min-h-screen bg-[#1e1f22]">
                    <div class="bg-[#2b2d31] shadow-sm sticky top-0 z-10">
                        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <div class="text-xl font-bold bg-gradient-to-r from-[#5865F2] to-[#EB459E] bg-clip-text text-transparent">8E Social</div>
                            </div>
                            <div class="flex items-center gap-3">
                                <button id="friendsNavBtn" class="text-gray-400 hover:text-white"><i class="fas fa-user-friends text-xl"></i></button>
                                <button id="serversNavBtn" class="text-gray-400 hover:text-white"><i class="fas fa-server text-xl"></i></button>
                                <button id="profileNavBtn" class="flex items-center gap-2">
                                    <img src="${currentUser.avatar}" class="w-8 h-8 rounded-full object-cover">
                                </button>
                                <button id="logoutBtn" class="text-gray-400 hover:text-white"><i class="fas fa-sign-out-alt text-xl"></i></button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="max-w-6xl mx-auto px-4 py-6">
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <!-- Left sidebar -->
                            <div class="lg:col-span-1 space-y-4">
                                ${pendingRequests.length > 0 ? `
                                    <div class="bg-[#2b2d31] rounded-xl p-4">
                                        <h3 class="text-white font-semibold mb-3">📨 Lời mời kết bạn</h3>
                                        ${pendingRequests.map(req => {
                                            const fromUser = getUserById(req.fromUserId);
                                            return `
                                                <div class="flex items-center justify-between p-2 rounded-lg">
                                                    <div class="flex items-center gap-3">
                                                        <img src="${fromUser.avatar}" class="w-10 h-10 rounded-full">
                                                        <div>
                                                            <p class="text-white text-sm">${fromUser.fullName}</p>
                                                        </div>
                                                    </div>
                                                    <div class="flex gap-2">
                                                        <button class="accept-friend px-3 py-1 bg-[#5865F2] text-white rounded-full text-xs" data-request-id="${req.id}" data-user-id="${req.fromUserId}">Đồng ý</button>
                                                        <button class="reject-friend px-3 py-1 bg-gray-600 text-white rounded-full text-xs" data-request-id="${req.id}">Từ chối</button>
                                                    </div>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                ` : ''}
                                
                                <div class="bg-[#2b2d31] rounded-xl p-4">
                                    <div class="flex justify-between items-center mb-3">
                                        <h3 class="text-white font-semibold">🖥️ Server của bạn</h3>
                                        <button id="createServerBtn" class="text-[#5865F2] text-sm">+ Tạo mới</button>
                                    </div>
                                    ${myServers.length === 0 ? `
                                        <p class="text-gray-400 text-sm text-center py-4">Chưa có server nào<br>Tạo server để trò chuyện</p>
                                    ` : `
                                        <div class="space-y-2">
                                            ${myServers.map(s => `
                                                <div class="server-card flex items-center gap-3 p-2 rounded-lg cursor-pointer hover:bg-[#1e1f22]" data-server-id="${s.id}">
                                                    <div class="w-10 h-10 bg-gradient-to-r from-[#5865F2] to-[#EB459E] rounded-full flex items-center justify-center text-white font-bold">${s.name.charAt(0)}</div>
                                                    <div class="flex-1">
                                                        <p class="text-white text-sm">${s.name}</p>
                                                        <p class="text-gray-400 text-xs">${s.members.length} thành viên</p>
                                                    </div>
                                                    <i class="fas fa-chevron-right text-gray-400 text-xs"></i>
                                                </div>
                                            `).join('')}
                                        </div>
                                    `}
                                </div>
                                
                                <div class="bg-[#2b2d31] rounded-xl p-4">
                                    <h3 class="text-white font-semibold mb-3">👥 Bạn bè (${friendList.length})</h3>
                                    ${friendList.length === 0 ? `
                                        <p class="text-gray-400 text-sm text-center py-4">Chưa có bạn bè<br>Hãy kết bạn để bắt đầu</p>
                                    ` : `
                                        <div class="space-y-2 max-h-80 overflow-y-auto">
                                            ${friendList.map(friend => `
                                                <div class="flex items-center justify-between p-2 rounded-lg hover:bg-[#1e1f22]">
                                                    <div class="flex items-center gap-3">
                                                        <img src="${friend.avatar}" class="w-10 h-10 rounded-full">
                                                        <div>
                                                            <p class="text-white text-sm">${friend.fullName}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            `).join('')}
                                        </div>
                                    `}
                                </div>
                            </div>
                            
                            <!-- Feed -->
                            <div class="lg:col-span-2 space-y-4">
                                <div class="bg-[#2b2d31] rounded-xl p-4">
                                    <div class="flex gap-3">
                                        <img src="${currentUser.avatar}" class="w-10 h-10 rounded-full">
                                        <input type="text" id="postContent" placeholder="Bạn đang nghĩ gì?" class="flex-1 p-3 bg-[#1e1f22] text-white rounded-full outline-none focus:ring-2 focus:ring-[#5865F2]">
                                    </div>
                                    <div class="flex justify-end mt-3">
                                        <button id="submitPostBtn" class="px-6 py-2 bg-[#5865F2] text-white rounded-full font-semibold hover:bg-[#4752C4]">Đăng</button>
                                    </div>
                                </div>
                                
                                ${posts.length === 0 ? `
                                    <div class="bg-[#2b2d31] rounded-xl p-8 text-center">
                                        <div class="text-6xl mb-4">📝</div>
                                        <p class="text-gray-400">Chưa có bài viết nào</p>
                                    </div>
                                ` : posts.map(post => {
                                    const isLiked = post.likes.includes(currentUser.id);
                                    return `
                                        <div class="bg-[#2b2d31] rounded-xl overflow-hidden">
                                            <div class="p-4">
                                                <div class="flex items-center gap-3 mb-3">
                                                    <img src="${post.userAvatar}" class="w-10 h-10 rounded-full">
                                                    <div>
                                                        <p class="text-white font-semibold">${post.userName}</p>
                                                        <p class="text-gray-400 text-xs">${formatTime(post.createdAt)}</p>
                                                    </div>
                                                </div>
                                                <p class="text-gray-200 mb-3">${escapeHtml(post.content)}</p>
                                                <div class="flex gap-4 border-t border-[#1e1f22] pt-3">
                                                    <button class="like-post flex items-center gap-2 text-sm ${isLiked ? 'text-[#5865F2]' : 'text-gray-400'}" data-post-id="${post.id}">
                                                        <i class="fas fa-heart"></i> ${post.likes.length} Thích
                                                    </button>
                                                    <button class="comment-toggle flex items-center gap-2 text-sm text-gray-400" data-post-id="${post.id}">
                                                        <i class="fas fa-comment"></i> ${post.comments.length} Bình luận
                                                    </button>
                                                </div>
                                                <div class="comments-section hidden mt-3 pt-3 border-t border-[#1e1f22]" id="comments-${post.id}">
                                                    ${post.comments.map(comment => `
                                                        <div class="flex gap-2 mb-2">
                                                            <img src="${comment.userAvatar}" class="w-6 h-6 rounded-full">
                                                            <div class="flex-1 bg-[#1e1f22] rounded-lg p-2">
                                                                <p class="text-xs text-white font-semibold">${comment.userName}</p>
                                                                <p class="text-sm text-gray-300">${escapeHtml(comment.content)}</p>
                                                            </div>
                                                        </div>
                                                    `).join('')}
                                                    <div class="flex gap-2 mt-2">
                                                        <img src="${currentUser.avatar}" class="w-6 h-6 rounded-full">
                                                        <input type="text" class="comment-input flex-1 p-2 bg-[#1e1f22] text-white rounded-full text-sm outline-none" placeholder="Viết bình luận..." data-post-id="${post.id}">
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function ProfileView() {
            return `
                <div class="min-h-screen bg-[#1e1f22]">
                    <div class="bg-[#2b2d31] shadow-sm sticky top-0 z-10">
                        <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <button id="backToFeed" class="text-gray-400 hover:text-white"><i class="fas fa-arrow-left text-xl"></i></button>
                                <div class="text-xl font-bold bg-gradient-to-r from-[#5865F2] to-[#EB459E] bg-clip-text text-transparent">8E Social</div>
                            </div>
                            <div class="flex items-center gap-3">
                                <button id="logoutBtn" class="text-gray-400 hover:text-white"><i class="fas fa-sign-out-alt text-xl"></i></button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="max-w-4xl mx-auto">
                        <div class="relative h-64 bg-gradient-to-r from-[#5865F2] to-[#EB459E]">
                            <div class="absolute -bottom-16 left-8">
                                <img src="${currentUser.avatar}" class="w-32 h-32 rounded-full border-4 border-[#1e1f22] object-cover">
                            </div>
                        </div>
                        
                        <div class="bg-[#2b2d31] rounded-xl mx-4 mt-20 p-6">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h1 class="text-2xl font-bold text-white">${currentUser.fullName}</h1>
                                    <p class="text-gray-400">@${currentUser.username}</p>
                                    <p class="text-gray-300 mt-2">${currentUser.bio}</p>
                                </div>
                                <button id="editProfileBtn" class="px-4 py-2 bg-[#1e1f22] text-white rounded-full text-sm hover:bg-[#3b3d41]">Chỉnh sửa</button>
                            </div>
                            
                            <div class="flex gap-6 mt-4 pt-4 border-t border-[#1e1f22]">
                                <div><span class="font-bold text-white">${currentUser.friends?.length || 0}</span> <span class="text-gray-400">bạn bè</span></div>
                                <div><span class="font-bold text-white">${currentUser.servers?.length || 0}</span> <span class="text-gray-400">server</span></div>
                            </div>
                        </div>
                    </div>
                    
                    <div id="editModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
                        <div class="bg-[#2b2d31] rounded-xl p-6 w-full max-w-md modal-animation">
                            <h3 class="text-xl font-bold text-white mb-4">Chỉnh sửa trang cá nhân</h3>
                            <div class="space-y-3">
                                <input type="text" id="editFullName" placeholder="Họ và tên" class="w-full p-3 bg-[#1e1f22] text-white rounded-lg" value="${currentUser.fullName}">
                                <textarea id="editBio" placeholder="Tiểu sử" rows="3" class="w-full p-3 bg-[#1e1f22] text-white rounded-lg">${currentUser.bio}</textarea>
                                <input type="text" id="editAvatar" placeholder="URL ảnh đại diện" class="w-full p-3 bg-[#1e1f22] text-white rounded-lg" value="${currentUser.avatar}">
                                <div class="flex gap-3">
                                    <button id="saveProfileBtn" class="flex-1 bg-[#5865F2] text-white py-2 rounded-lg font-semibold">Lưu</button>
                                    <button id="closeEditModal" class="flex-1 bg-[#1e1f22] text-white py-2 rounded-lg font-semibold">Hủy</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // ==================== RENDER ====================
        function renderApp() {
            loadData();
            
            const app = document.getElementById('app');
            let html = '';
            
            if (!currentUser) {
                if (currentView === 'login') html = LoginScreen();
                else if (currentView === 'register') html = RegisterScreen();
                else html = WelcomeScreen();
            } else {
                if (currentView === 'profile') html = ProfileView();
                else if (currentView === 'server') html = ServerView();
                else if (currentView === 'friends') html = FriendsView();
                else html = FeedView();
            }
            
            app.innerHTML = html;
            attachEvents();
        }
        
        function attachEvents() {
            if (!currentUser) {
                const loginBtn = document.getElementById('loginBtn');
                const registerBtn = document.getElementById('registerBtn');
                if (loginBtn) loginBtn.onclick = () => { currentView = 'login'; renderApp(); };
                if (registerBtn) registerBtn.onclick = () => { currentView = 'register'; renderApp(); };
                
                const loginForm = document.getElementById('loginForm');
                if (loginForm) loginForm.onsubmit = handleLogin;
                const switchToRegister = document.getElementById('switchToRegister');
                if (switchToRegister) switchToRegister.onclick = () => { currentView = 'register'; renderApp(); };
                
                const registerForm = document.getElementById('registerForm');
                if (registerForm) registerForm.onsubmit = handleRegister;
                const switchToLogin = document.getElementById('switchToLogin');
                if (switchToLogin) switchToLogin.onclick = () => { currentView = 'login'; renderApp(); };
            } else {
                // Navigation
                const friendsNavBtn = document.getElementById('friendsNavBtn');
                const serversNavBtn = document.getElementById('serversNavBtn');
                const profileNavBtn = document.getElementById('profileNavBtn');
                const backToFeed = document.getElementById('backToFeed');
                const logoutBtn = document.getElementById('logoutBtn');
                
                if (friendsNavBtn) friendsNavBtn.onclick = () => { currentView = 'friends'; renderApp(); };
                if (serversNavBtn) serversNavBtn.onclick = () => { currentView = 'feed'; renderApp(); };
                if (profileNavBtn) profileNavBtn.onclick = () => { currentView = 'profile'; renderApp(); };
                if (backToFeed) backToFeed.onclick = () => { currentView = 'feed'; renderApp(); };
                if (logoutBtn) logoutBtn.onclick = logout;
                
                // Server actions
                const createServerBtn = document.getElementById('createServerBtn');
                if (createServerBtn) createServerBtn.onclick = createServer;
                
                document.querySelectorAll('.server-card').forEach(card => {
                    card.onclick = () => {
                        const serverId = card.dataset.serverId;
                        currentServer = servers.find(s => s.id === serverId);
                        currentChannel = 'general';
                        currentView = 'server';
                        renderApp();
                    };
                });
                
                // Server view events
                const sendServerMsgBtn = document.getElementById('sendServerMsgBtn');
                const serverMessageInput = document.getElementById('serverMessageInput');
                if (sendServerMsgBtn) sendServerMsgBtn.onclick = sendServerMessage;
                if (serverMessageInput) serverMessageInput.onkeypress = (e) => { if (e.key === 'Enter') sendServerMessage(); };
                
                document.querySelectorAll('.channel-item').forEach(ch => {
                    ch.onclick = () => {
                        currentChannel = ch.dataset.channel;
                        renderApp();
                    };
                });
                
                const leaveServerBtn = document.getElementById('leaveServerBtn');
                if (leaveServerBtn) leaveServerBtn.onclick = () => {
                    if (confirm('Rời khỏi server?')) {
                        currentView = 'feed';
                        currentServer = null;
                        renderApp();
                    }
                };
                
                // Feed events
                const submitPostBtn = document.getElementById('submitPostBtn');
                const postContent = document.getElementById('postContent');
                if (submitPostBtn && postContent) submitPostBtn.onclick = () => { createPost(postContent.value); };
                if (postContent) postContent.onkeypress = (e) => { if (e.key === 'Enter') createPost(postContent.value); };
                
                document.querySelectorAll('.like-post').forEach(btn => {
                    btn.onclick = () => likePost(btn.dataset.postId);
                });
                
                document.querySelectorAll('.comment-toggle').forEach(btn => {
                    btn.onclick = () => {
                        const commentsDiv = document.getElementById(`comments-${btn.dataset.postId}`);
                        if (commentsDiv) commentsDiv.classList.toggle('hidden');
                    };
                });
                
                document.querySelectorAll('.comment-input').forEach(input => {
                    input.onkeypress = (e) => {
                        if (e.key === 'Enter') {
                            addComment(input.dataset.postId, input.value);
                            input.value = '';
                        }
                    };
                });
                
                // Friend actions
                document.querySelectorAll('.accept-friend').forEach(btn => {
                    btn.onclick = () => acceptFriendRequest(btn.dataset.requestId, btn.dataset.userId);
                });
                document.querySelectorAll('.reject-friend').forEach(btn => {
                    btn.onclick = () => rejectFriendRequest(btn.dataset.requestId);
                });
                document.querySelectorAll('.add-friend-btn').forEach(btn => {
                    btn.onclick = () => sendFriendRequest(btn.dataset.userId);
                });
                
                // Search
                const searchBtn = document.getElementById('searchBtn');
                const searchInput = document.getElementById('searchInput');
                if (searchBtn) searchBtn.onclick = searchFriends;
                if (searchInput) searchInput.onkeypress = (e) => { if (e.key === 'Enter') searchFriends(); };
                
                // Profile
                const editProfileBtn = document.getElementById('editProfileBtn');
                const editModal = document.getElementById('editModal');
                const closeEditModal = document.getElementById('closeEditModal');
                const saveProfileBtn = document.getElementById('saveProfileBtn');
                
                if (editProfileBtn && editModal) editProfileBtn.onclick = () => editModal.classList.remove('hidden');
                if (closeEditModal && editModal) closeEditModal.onclick = () => editModal.classList.add('hidden');
                if (saveProfileBtn) saveProfileBtn.onclick = updateProfile;
            }
        }
        
        loadData();
        renderApp();
    </script>
</body>
</html>
